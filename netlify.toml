[build]
  publish = "."
  
[[redirects]]
  from = "/chat"
  to = "https://gost-assistant-backend.onrender.com/chat"
  status = 200
  force = true

[[redirects]]
  from = "/feedback"
  to = "https://gost-assistant-backend.onrender.com/feedback"
  status = 200
  force = true

[[redirects]]
  from = "/search"
  to = "https://gost-assistant-backend.onrender.com/search"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://gost-assistant-backend.onrender.com/health"
  status = 200
  force = true
  
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    
